<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./apple-touch-icon.png">
<title>Dead World — Survival RPG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');
:root{--p:#1a1a1a;--pd:#222;--ink:#d4d0c8;--im:#8a8578;--g:#b8342a;--gd:#8a2018;--bl:#cc3333;--bll:#ff4444;--st:#666;--sl:#888;--hg:#4a8c3a;--xb:#3a6ca8;--st2:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);--font:'Special Elite',monospace;--font2:'Courier Prime',monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#000;font-family:var(--font2);color:var(--ink);min-height:100dvh;overscroll-behavior:none}
#W{max-width:430px;margin:0 auto;background:var(--p);min-height:100dvh;overflow:hidden;box-shadow:0 0 40px rgba(180,50,40,.15)}
#H{position:sticky;top:0;background:#0d0d0d;color:var(--g);text-align:center;padding:calc(var(--st2)+8px) 12px 7px;font-size:15px;font-weight:bold;letter-spacing:3px;z-index:100;border-bottom:1px solid #331a18;text-transform:uppercase;font-family:var(--font);text-shadow:0 0 10px rgba(184,52,42,.3)}
#HS{font-size:10px;color:#665;letter-spacing:1px;margin-top:2px;font-family:var(--font2)}
#SB{background:#111;color:var(--ink);font-size:10px;display:flex;flex-wrap:wrap;padding:3px 4px;gap:2px;font-family:var(--font2)}
#SB .s{flex:1 1 auto;text-align:center;padding:2px 3px;white-space:nowrap}
#SB .s b{color:var(--g)}
#C{padding:10px;padding-bottom:calc(100px + var(--sb))}
.log-day-group{margin:4px 0;border:1px solid #333;border-radius:6px;overflow:hidden}
.log-day-header{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#1e1e1e;cursor:pointer;font-size:12px;font-weight:bold;color:var(--ink)}
.log-day-header:active{background:#282828}
.log-day-summary{font-size:11px;color:var(--st);font-weight:normal;font-style:italic}
.log-day-entries{display:none;padding:4px 10px 8px;font-size:12px;line-height:1.6}
.log-day-entries.open{display:block}
.log-entry{padding:3px 0;border-bottom:1px dotted #333}.log-entry:last-child{border-bottom:none}
.combat-log{color:var(--bl)}.event-log{color:#4a8a4a}.quest-log{color:#5a7aaa}
#RP{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--p);border:2px solid var(--gd);border-radius:12px;padding:20px;width:90%;max-width:340px;z-index:350;text-align:center;box-shadow:0 0 40px rgba(0,0,0,.8),0 0 20px rgba(184,52,42,.15);display:none;opacity:0;transition:opacity .2s ease}
#RP.show{display:block;opacity:1}
#RBG{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:340;display:none}
#RBG.show{display:block}
.T{display:none}.T.A{display:block}
#N{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0d0d0d;display:flex;border-top:1px solid #331a18;z-index:100;padding-bottom:var(--sb)}
#N button{flex:1;padding:7px 1px 5px;background:0 0;color:#777;border:0;font-size:8px;text-align:center;cursor:pointer;line-height:1.3;font-family:var(--font2)}
#N button i{font-size:14px;display:block;font-style:normal}
#N button.A{background:#1a0d0d;color:var(--g)}
.sh{color:var(--g);padding:4px 0;margin:12px 0 4px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid #333;font-family:var(--font)}
.cd{background:var(--pd);border:1px solid #333;border-radius:8px;padding:10px;margin:5px 0}
.bt{display:block;width:100%;padding:9px 12px;margin:3px 0;background:#333;color:var(--ink);border:none;border-radius:6px;font-family:var(--font2);font-size:13px;font-weight:bold;cursor:pointer;text-align:left}
.bt:active{opacity:.85}.bt.go{background:var(--gd);color:#fff}
.bt.dn{background:#552222;color:#ddd}.bt.sm{display:inline-block;width:auto;padding:4px 9px;font-size:11px;margin:2px}
.bt:disabled{opacity:.4}
.hb{background:#2a2a2a;border-radius:4px;height:8px;overflow:hidden;margin:3px 0}
.hf{height:100%;border-radius:4px;transition:width .3s;background:var(--hg)}
.hf.lo{background:#aa8820}.hf.cr{background:var(--bl)}
.xb{background:#2a2a2a;border-radius:4px;height:5px;overflow:hidden;margin:2px 0}
.xf{height:100%;background:var(--xb);border-radius:4px;transition:width .3s}
.si{display:flex;align-items:center;gap:8px;padding:7px 8px;background:#1e1e1e;border:1px solid #333;border-radius:5px;margin:4px 0}
#CO{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;justify-content:center;align-items:flex-start;z-index:200;padding-top:10px;overflow-y:auto}
#CP{background:var(--p);border:2px solid var(--gd);border-radius:10px;padding:12px;width:96%;max-width:400px}
.cu{background:#1e1e1e;border:1px solid #444;border-radius:6px;padding:7px;text-align:center;position:relative;flex:1 1 70px;min-width:60px;max-width:110px}
.cu.sh2{animation:sk .3s ease}
@keyframes sk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.cu .ue{font-size:28px;display:block}.cu .un{font-size:11px;font-weight:bold;margin:2px 0;color:var(--ink)}.cu .uh{font-size:10px;color:var(--st)}.cu.dead{opacity:.4;filter:grayscale(1)}
.df{position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:16px;font-weight:bold;color:var(--bl);pointer-events:none;animation:fu .8s ease forwards;z-index:10}
.df.hl{color:#3a9a3a}
@keyframes fu{0%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-30px)}}
#TO{position:fixed;inset:0;background:#0a0a0a;display:none;flex-direction:column;justify-content:center;align-items:center;z-index:200;padding:20px;text-align:center}
#TO.A{display:flex}
#TS{font-size:40px;margin-bottom:12px;animation:bob 1.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#TT{color:var(--ink);font-size:14px;line-height:1.7;max-width:320px;min-height:60px}
#TP{width:200px;background:#2a2a2a;border-radius:4px;height:6px;margin-top:14px;overflow:hidden}
#TB{height:100%;background:var(--g);width:0%;transition:width .4s}
#TC{margin-top:16px;width:100%;max-width:320px}
#TC .bt{text-align:center}
#TN{margin-top:12px}
#BO{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;z-index:250;overflow-y:auto}
#BO.A{display:block}
#BI{max-width:430px;margin:0 auto;min-height:100dvh;background:var(--p)}
.bh{background:#0d0d0d;color:var(--g);padding:calc(var(--st2) + 12px) 12px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #331a18;position:sticky;top:0;z-index:10;font-family:var(--font)}
.bb{font-size:24px;cursor:pointer;padding:8px 12px;border-radius:6px;background:rgba(255,255,255,.08);min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.ba{padding:12px 14px;font-size:12px;font-style:italic;color:var(--im);line-height:1.7;border-bottom:1px solid #333;background:linear-gradient(to bottom,#1e1e1e,var(--p))}
.bn{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid #2a2a2a}
.bp{padding:10px 14px 24px}
.bs2{font-size:11px;font-weight:bold;color:var(--g);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;padding-bottom:3px;border-bottom:1px solid #333;font-family:var(--font)}
.ec{background:#1e1e1e;border:1px solid #444;border-radius:8px;padding:10px;margin:6px 0;cursor:pointer;display:flex;align-items:center;gap:10px}
.ec:active{background:#282828}
.qc{background:#1e1e1e;border:1px solid #444;border-left:3px solid var(--gd);border-radius:5px;padding:8px 10px;margin:5px 0}
.qc.done{border-left-color:var(--hg);opacity:.7}
.bc{background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:10px 12px;margin:4px 0;display:flex;gap:10px;align-items:center;cursor:pointer}
.bc:active{background:#282828}
.rc{background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:10px;margin:6px 0}
#LO{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;justify-content:center;align-items:center;z-index:300}
#LP{background:var(--p);border:2px solid var(--g);border-radius:10px;padding:20px;width:90%;max-width:360px;text-align:center;animation:pi .3s ease}
@keyframes pi{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.spr{display:flex;align-items:center;justify-content:space-between;margin:6px 0;padding:6px 10px;background:#1e1e1e;border-radius:5px;color:var(--ink)}
.spr button{background:#333;color:var(--ink);border:none;border-radius:4px;width:32px;height:32px;font-size:18px;cursor:pointer}
.spr button:disabled{opacity:.3}
#DO{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;z-index:400;padding:20px}
#DO.A{display:flex}
#DB{background:var(--p);border:2px solid #444;border-radius:8px;padding:16px;width:100%;max-width:360px;max-height:85vh;overflow-y:auto;color:var(--ink)}
#NF{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:#1a0a0a;color:var(--g);padding:8px 18px;border-radius:20px;font-size:13px;z-index:500;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;max-width:90%;text-align:center;border:1px solid var(--gd);font-family:var(--font2)}
#NF.show{opacity:1;transform:translateX(-50%) translateY(0)}
.pc{background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:10px;margin:5px 0}
#ticker{position:fixed;top:80px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:150;pointer-events:none}
#ticker-inner{background:linear-gradient(to right,#0d0d0d,#1a0d0d);color:var(--g);font-size:11px;padding:5px 12px;text-align:center;font-style:italic;opacity:0;transition:opacity .3s;pointer-events:none;font-family:var(--font2)}
#ticker-inner.show{opacity:1}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
/* ZOMBIE MINIGAME */
#ZG{position:fixed;inset:0;background:#0a0a0a;display:none;z-index:280;overflow:hidden}
#ZG.A{display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
#ZG-header{width:100%;max-width:430px;background:#111;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #331a18;font-family:var(--font);color:var(--g);font-size:13px}
#ZG-area{width:100%;max-width:430px;flex:1;position:relative;background:#0d0d0d;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
.zombie{position:absolute;font-size:32px;cursor:pointer;transition:transform .1s;animation:zWalk linear forwards;filter:drop-shadow(0 0 6px rgba(0,200,0,.3));-webkit-user-select:none;user-select:none}
.zombie:active{transform:scale(1.3)}
.zombie.zDead{animation:zDie .4s ease forwards!important;pointer-events:none;filter:grayscale(1) brightness(.5)}
@keyframes zDie{0%{transform:scale(1);opacity:1}50%{transform:scale(1.4) rotate(15deg)}100%{transform:scale(0) rotate(45deg);opacity:0}}
@keyframes zWalk{0%{top:-40px}100%{top:calc(100% + 40px)}}
.z-splat{position:absolute;font-size:24px;pointer-events:none;animation:splatFade .6s ease forwards}
@keyframes splatFade{0%{transform:scale(.5);opacity:1}100%{transform:scale(1.5);opacity:0}}
#ZG-hud{width:100%;max-width:430px;background:#111;padding:10px 14px;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #331a18;font-family:var(--font2);font-size:12px;color:var(--ink)}
.z-combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;font-weight:bold;color:var(--g);font-family:var(--font);pointer-events:none;animation:comboPop .5s ease forwards;z-index:290;text-shadow:0 0 20px rgba(184,52,42,.6)}
@keyframes comboPop{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
</style>
</head>
<body>
<div id="W">
<div id="H">☠ DEAD WORLD ☠<div id="HS"></div></div>
<div id="SB"></div>
<div id="C">
<div id="realm-tab" class="T"></div><div id="roads-tab" class="T"></div><div id="character-tab" class="T"></div>
<div id="company-tab" class="T"></div><div id="pack-tab" class="T"></div><div id="quests-tab" class="T"></div>
<div id="social-tab" class="T"></div><div id="log-tab" class="T"></div>
</div>
<div id="N">
<button id="tb-realm" onclick="sw('realm')"><i>🏚</i>Camp</button>
<button id="tb-roads" onclick="sw('roads')"><i>🗺</i>Map</button>
<button id="tb-character" onclick="sw('character')"><i>🧍</i>Self</button>
<button id="tb-company" onclick="sw('company')"><i>👥</i>Group</button>
<button id="tb-pack" onclick="sw('pack')"><i>🎒</i>Pack</button>
<button id="tb-quests" onclick="sw('quests')"><i>📋</i>Tasks</button>
<button id="tb-social" onclick="sw('social')"><i>❤</i>Bonds</button>
<button id="tb-log" onclick="sw('log')"><i>📖</i>Log</button>
</div>
<div id="CO"><div id="CP"><div id="CT" style="text-align:center;font-size:16px;font-weight:bold;color:var(--bl);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;border-bottom:1px solid var(--gd);padding-bottom:6px;font-family:var(--font)">FIGHT!</div><div id="EA" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px"></div><div id="AA" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px"></div><div id="CL" style="max-height:100px;overflow-y:auto;font-size:11px;background:#111;color:#a88;border-radius:5px;padding:5px 7px;margin:6px 0;line-height:1.6;font-family:var(--font2)"></div><div id="CA" style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px"></div></div></div>
<div id="TO"><div id="TS">🌄</div><div id="TT"></div><div id="TP"><div id="TB"></div></div><div id="TC"></div><button id="TINV" class="bt" style="display:none;max-width:200px;text-align:center;margin-top:6px" onclick="openTravelInv()">🎒 Inventory</button>
<button id="TN" class="bt go" style="display:none;max-width:200px" onclick="travelCont()">Continue...</button></div>
<div id="BO"><div id="BI"></div></div>
<div id="LO"><div id="LP"><h2 style="color:var(--g);font-size:20px;margin-bottom:6px;font-family:var(--font)">⬆ Level Up!</h2><p id="LT" style="font-size:13px;margin-bottom:12px;color:var(--ink)"></p><div id="LPT"></div><div id="LR" style="font-size:12px;margin:8px 0;color:var(--ink)"></div><button class="bt go" onclick="confirmLU()">Confirm</button></div></div>
<div id="DO"><div id="DB"></div></div>
<div id="NF"></div>
<div id="ticker"><div id="ticker-inner"></div></div>
<div id="RBG"></div>
<div id="RP"></div>
</div>
<!-- ZOMBIE MINIGAME OVERLAY -->
<div id="ZG">
<div id="ZG-header"><span>☠ ZOMBIE DEFENSE</span><span id="zg-wave">Wave 1</span><button class="bt sm dn" onclick="endZombieGame()" style="padding:4px 10px">✕ Retreat</button></div>
<div id="ZG-area"></div>
<div id="ZG-hud">
<span>🎯 Kills: <b id="zg-kills">0</b></span>
<span>🔥 Combo: <b id="zg-combo">0</b>x</span>
<span>❤ Missed: <b id="zg-missed">0</b>/<b id="zg-maxmiss">10</b></span>
<span>💰 <b id="zg-loot">0</b></span>
</div>
</div>
<script>
// ============================================================
// HELPERS
// ============================================================
function $(id){return document.getElementById(id)}
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function rndA(a){return a[Math.floor(Math.random()*a.length)]}
function R(){return Math.random()}
function clone(o){return JSON.parse(JSON.stringify(o))}
function notify(m,d=2200){const n=$('NF');n.textContent=m;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),d)}
function showResult(title,emoji,lines,btnText,btnFn){
  const rp=$('RP');const bg=$('RBG');
  rp.innerHTML=`<div style="font-size:40px;margin-bottom:8px">${emoji}</div><div style="font-size:16px;font-weight:bold;margin-bottom:10px;color:var(--ink);font-family:var(--font)">${title}</div>${lines.map(l=>'<div style="font-size:12px;margin:4px 0;color:var(--im)">'+l+'</div>').join('')}<button class="bt go" style="margin-top:12px;text-align:center" onclick="closeResult();${btnFn||''}">${btnText||'Continue'}</button>`;
  rp.style.display='block';bg.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{rp.classList.add('show');bg.classList.add('show')}));
}
function closeResult(){const rp=$('RP');rp.classList.remove('show');$('RBG').classList.remove('show');setTimeout(()=>{rp.style.display='none';$('RBG').style.display='none'},200)}
function openDlg(h){$('DB').innerHTML=h;$('DO').classList.add('A')}
function closeDlg(){$('DO').classList.remove('A')}
function hpPct(h,m){return Math.max(0,Math.min(100,Math.round(h/m*100)))}
function hpCls(p){return p<=20?'cr':p<=50?'lo':''}

// ============================================================
// DATA — WALKING DEAD UNIVERSE
// ============================================================
const LOCS={
Atlanta:{n:"Atlanta",r:"Georgia",d:"The city fell first. Walkers choke every street.",e:"🏙",t:"city",b:["safehouse","trading_post","infirmary","workshop","armory"],f:"None",dg:3,
  sur:[{n:"Downtown Ruins",e:"🏚",d:"Collapsed buildings. Walkers everywhere.",en:["walker","walker","walker_fast"],lt:["canned_food","bandage","pipe","ammo"]},{n:"Hospital Wing",e:"🏥",d:"Overrun. Medical supplies remain.",en:["walker","walker","crawler"],lt:["medkit","antibiotics","bandage","scalpel"]},{n:"Highway Pileup",e:"🚗",d:"Abandoned cars. Scavenge or die.",en:["walker","bandit","raider"],lt:["gas_can","canned_food","wrench","water"]}]},
Prison:{n:"The Prison",r:"Georgia",d:"Fences hold. For now. A fortress if you can clear it.",e:"🏢",t:"fortress",b:["safehouse","armory","infirmary","workshop","garden"],f:"None",dg:2,
  sur:[{n:"Prison Yard",e:"⛓",d:"Walkers press against the fences.",en:["walker","walker","armored_walker"],lt:["riot_gear","baton","canned_food","ammo"]},{n:"Tombs",e:"💀",d:"Dark corridors. Something shuffles.",en:["walker","walker","walker","crawler"],lt:["ammo","flashlight","medkit"]}]},
Farm:{n:"Greene Farm",r:"Rural Georgia",d:"Quiet fields. A barn with secrets.",e:"🌾",t:"farm",b:["safehouse","trading_post","garden"],f:"None",dg:1,
  sur:[{n:"The Barn",e:"🏚",d:"Don't open that door.",en:["walker","walker","walker"],lt:["rope","axe","canned_food","water"]},{n:"Open Fields",e:"🌿",d:"Clear sightlines. Mostly safe.",en:["walker","wolf"],lt:["rabbit_meat","herbs","water","berries"]}]},
Woodbury:{n:"Woodbury",r:"Georgia",d:"Walled town. Order maintained by force.",e:"🏘",t:"settlement",b:["safehouse","trading_post","armory","workshop","alehouse","infirmary"],f:"Governor",dg:1,seat:1,
  sur:[{n:"Wall Perimeter",e:"🧱",d:"Guards patrol. Walkers gather.",en:["walker","walker"],lt:["ammo","canned_food","water"]},{n:"Arena",e:"⚔",d:"Where the Governor entertains.",en:["fighter","raider"],lt:["machete","armor_vest","medkit"]}]},
Alexandria:{n:"Alexandria",r:"Virginia",d:"Solar panels. Running water. Walls. A miracle.",e:"🏡",t:"settlement",b:["safehouse","trading_post","armory","workshop","infirmary","garden","alehouse"],f:"Alexandria",dg:1,seat:1,
  sur:[{n:"Suburban Streets",e:"🏘",d:"Empty houses to scavenge.",en:["walker","walker","lurker"],lt:["canned_food","water","clothing","batteries"]},{n:"The Quarry",e:"🪨",d:"A massive walker herd gathers here.",en:["walker","walker","walker","walker_fast"],lt:["fuel","scrap_metal","pipe"]}]},
Hilltop:{n:"Hilltop Colony",r:"Virginia",d:"A mansion on a hill. Crops grow behind wooden walls.",e:"🏔",t:"settlement",b:["safehouse","trading_post","infirmary","workshop","garden"],f:"Hilltop",dg:1,seat:1,

function atk(){let a=(S.atk_base||5)+Math.floor(S.level*.6);if(S.gear.w)a+=(ITEMS[S.gear.w]?.a||0);return a}
function def(){let d=(S.def_base||3)+Math.floor(S.level*.4);['helm','chest','legs','boots','shield'].forEach(sl=>{if(S.gear[sl])d+=(ITEMS[S.gear[sl]]?.d||0)});return d}

let zGame=null;
function startZombieGame(){
  zGame={kills:0,combo:0,maxCombo:0,missed:0,maxMiss:10,wave:1,loot:0,active:true,spawnRate:1500,zombieSpeed:6000,spawner:null,zombies:[]};
  $('ZG').classList.add('A');$('zg-kills').textContent='0';$('zg-combo').textContent='0';$('zg-missed').textContent='0';$('zg-maxmiss').textContent='10';$('zg-loot').textContent='0';$('zg-wave').textContent='Wave 1';
  $('ZG-area').innerHTML='';
  zGame.spawner=setInterval(spawnZombie,zGame.spawnRate);
  // Wave progression
  zGame.waveTimer=setInterval(()=>{
    if(!zGame||!zGame.active)return;
    zGame.wave++;$('zg-wave').textContent='Wave '+zGame.wave;
    // Speed up
    clearInterval(zGame.spawner);
    zGame.spawnRate=Math.max(400,zGame.spawnRate-150);
    zGame.zombieSpeed=Math.max(2000,zGame.zombieSpeed-500);
    zGame.spawner=setInterval(spawnZombie,zGame.spawnRate);
    // Combo popup
    const cp=el('div','z-combo','WAVE '+zGame.wave+'!');document.body.appendChild(cp);setTimeout(()=>cp.remove(),600);
  },12000);
}

function spawnZombie(){
  if(!zGame||!zGame.active)return;
  const area=$('ZG-area');const rect=area.getBoundingClientRect();
  const z=document.createElement('div');z.className='zombie';
  const types=['🧟','🧟‍♂️','🧟','🧟','💀','🧟','🤢'];
  const weights=[1,zGame.wave>2?.3:0,1,1,zGame.wave>1?.2:0,1,zGame.wave>3?.15:0];
  z.textContent=rndA(types);
  const x=rnd(10,rect.width-50);
  z.style.left=x+'px';
  const speed=zGame.zombieSpeed+rnd(-1000,1000);
  z.style.animationDuration=Math.max(1500,speed)+'ms';
  z.dataset.alive='1';

  // Touch/click to kill
  const killZ=(e)=>{
    e.preventDefault();e.stopPropagation();
    if(z.dataset.alive!=='1')return;
    z.dataset.alive='0';
    z.classList.add('zDead');
    zGame.kills++;zGame.combo++;
    if(zGame.combo>zGame.maxCombo)zGame.maxCombo=zGame.combo;
    // Loot chance
    if(R()<.3)zGame.loot+=rnd(1,3);
    // Splat effect
    const splat=el('div','z-splat','💥');splat.style.left=(parseInt(z.style.left)||0)+'px';splat.style.top=z.getBoundingClientRect().top-area.getBoundingClientRect().top+'px';area.appendChild(splat);setTimeout(()=>splat.remove(),600);
    // Combo popup
    if(zGame.combo>=5&&zGame.combo%5===0){const cp=el('div','z-combo',zGame.combo+'x COMBO!');document.body.appendChild(cp);setTimeout(()=>cp.remove(),600)}
    $('zg-kills').textContent=zGame.kills;$('zg-combo').textContent=zGame.combo;$('zg-loot').textContent=zGame.loot;
    setTimeout(()=>z.remove(),500);
  };
  z.addEventListener('pointerdown',killZ);
  z.addEventListener('touchstart',killZ,{passive:false});

  // Missed — reached bottom
  z.addEventListener('animationend',()=>{
    if(z.dataset.alive==='1'){
      zGame.missed++;zGame.combo=0;
      $('zg-missed').textContent=zGame.missed;$('zg-combo').textContent='0';
      z.remove();
      if(zGame.missed>=zGame.maxMiss)endZombieGame();
    }
  });

  area.appendChild(z);
}

function endZombieGame(){
  if(!zGame)return;
  zGame.active=false;
  clearInterval(zGame.spawner);clearInterval(zGame.waveTimer);
  $('ZG-area').innerHTML='';$('ZG').classList.remove('A');
  const kills=zGame.kills;const loot=zGame.loot;const waves=zGame.wave;const maxCombo=zGame.maxCombo;
  const xp=kills*2+waves*5;
  S.gold+=loot;S.xp+=xp;S.zombieKills=(S.zombieKills||0)+kills;S.headshots=(S.headshots||0)+Math.floor(kills*.7);
  S.fame=(S.fame||0)+Math.floor(kills/5);
  if(kills>=20)S.prestige=(S.prestige||0)+1;
  chkLU();save();
  const lines=['☠ <b>'+kills+'</b> walkers destroyed','🔥 Max combo: <b>'+maxCombo+'x</b>','🌊 Survived <b>'+waves+'</b> waves','📦 Scavenged <b>'+loot+'</b> supplies','⭐ <b>+'+xp+'</b> XP'];
  if(kills>=20)lines.push('⭐ +1 prestige');
  showResult('Defense Complete!','☠',lines,'Continue','upAll()');
  zGame=null;
}

function beginTravel(dest,days){
  tDest=dest;tDays=days;
  $('TO').classList.add('A');$('TB').style.width='0%';$('TS').textContent='🚶';
  $('TT').innerHTML=`Heading to <b>${LOCS[dest]?.n}</b>...<br><span style="font-size:12px;color:var(--st)">${days} day journey. Stay alert.</span>`;
  const rc=retainerSays('travel');if(rc)$('TT').innerHTML+=`<br><br><span style="font-size:12px;color:var(--im)">💬 ${rc.name}: "${rc.line}"</span>`;
  $('TC').innerHTML='';$('TN').style.display='block';$('TINV').style.display='block';
  $('TN').onclick=()=>processTravelDay(0);
}

function processTravelDay(day){
  S.days++;S.daysWithoutBite++;
  $('TB').style.width=Math.round(((day+1)/tDays)*100)+'%';

  if(day>=tDays){
    S.loc=tDest;const loc=LOCS[tDest];
    if(loc?.f&&loc.f!=='None')S.rep[loc.f]=(S.rep[loc.f]||0)+1;

function openNPCInteraction(npc,existing){
  let rel=existing||{name:npc.name,rel:'stranger',aff:0,male:npc.male,age:npc.age,loc:S.loc,met:S.days};

  h+=`<button class="bt" onclick="npcAct('chat','${npc.name}')">💬 Talk</button>`;
  h+=`<button class="bt" onclick="npcAct('share','${npc.name}')">🥫 Share food (2 supplies)</button>`;
  if(aff>=30)h+=`<button class="bt" onclick="npcAct('recruit','${npc.name}')">👥 Ask to join your group</button>`;
  h+=`<button class="bt dn" onclick="closeDlg()">Walk away</button>`;

function npcAct(action,name){
  let rel=S.relationships.find(r=>r.name===name);
  if(!rel){rel={name,rel:'stranger',aff:0,male:R()<.5,age:rnd(18,55),loc:S.loc,met:S.days};S.relationships.push(rel)}
  let msg='',affChange=0;
  if(action==='chat'){affChange=rnd(3,10);msg=rndA(['You share survival stories.','You discuss the state of things.','A moment of normalcy.'])}
  if(action==='share'){if(S.gold<2){notify('Not enough supplies.');return}S.gold-=2;affChange=rnd(8,18);msg='They gratefully accept the food.'}
  if(action==='recruit'){
    if(rel.aff<30){closeDlg();showResult('Declined','😐',['Not enough trust yet.'],null,'upAll()');return}
    if(S.rets.length>=4){closeDlg();showResult('Full','👥',['Group is full (max 4).'],null,'upAll()');return}
    const rt=rndA(Object.keys(RET_T));const rtd=RET_T[rt];const trait=rndA(TRAITS);
    S.rets.push({name:rel.name,role:rtd.n,e:rtd.e,a:rtd.a,def:rtd.d||2,hp:rtd.hp,maxHp:rtd.hp,w:rtd.w||4,loy:50,trait:trait.t,td:trait.d,back:rndA(BACKS),gear:null,armour:null});
    S.relationships=S.relationships.filter(r=>r.name!==name);
    closeDlg();showResult('Joined!','👥',[rel.name+' joins your group!','Role: '+rtd.n,'Trait: '+trait.t],null,'upAll()');return;
  }
  rel.aff=Math.min(100,(rel.aff||0)+affChange);if(affChange>0&&rel.rel==='stranger')rel.rel='acquaintance';if(rel.aff>=50&&rel.rel==='acquaintance')rel.rel='friend';if(rel.aff>=80)rel.rel='trusted';
  closeDlg();showResult(name.split(' ')[0],rel.male?'👨':'👩',[msg,'Trust: <b>+'+affChange+'</b> ('+rel.aff+')'],null,'upAll()');
}

function chkLU(){while(S.xp>=xpNeed(S.level)){S.xp-=xpNeed(S.level);S.level++;S.sp+=1;S.prestige=(S.prestige||0)+1;S.maxHp=maxHp();S.hp=Math.min(S.hp+15,S.maxHp);log('⬆ Level '+S.level+'!','q');notify('Level '+S.level+'!')}if(S.sp>0)setTimeout(()=>{if(S.sp>0)openLU()},300)}

function renderLU(){const pts=S.sp-Object.values(tmpLU).reduce((a,b)=>a+b,0);$('LT').textContent='Level '+S.level;$('LR').textContent='Points: '+pts;$('LPT').innerHTML=[['⚔ Combat','atk_base'],['🛡 Toughness','def_base'],['💨 Speed','spd']].map(([l,k])=>{const c=S[k]||3,a=tmpLU[k];return'<div class="spr"><div style="font-size:13px;font-weight:bold;flex:1">'+l+'<br><span style="font-size:10px;color:var(--st)">'+c+' → '+(c+a)+'</span></div><button onclick="adjLU(\''+k+'\',-1)"'+(a<=0?' disabled':'')+'>−</button><div style="font-size:16px;font-weight:bold;width:30px;text-align:center;color:var(--g)">'+a+'</div><button onclick="adjLU(\''+k+'\',1)"'+(pts<=0?' disabled':'')+'>+</button></div>'}).join('')}
function adjLU(k,d){const pts=S.sp-Object.values(tmpLU).reduce((a,b)=>a+b,0);if(d>0&&pts<=0)return;if(d<0&&tmpLU[k]<=0)return;tmpLU[k]+=d;renderLU()}
function confirmLU(){const r=S.sp-Object.values(tmpLU).reduce((a,b)=>a+b,0);if(r>0){notify(r+' points left!');return}Object.entries(tmpLU).forEach(([k,v])=>S[k]=(S[k]||3)+v);S.sp=0;S.maxHp=maxHp();$('LO').style.display='none';upAll()}

function upPack(){const tab=$('pack-tab');tab.innerHTML='';
  tab.appendChild(el('div','sh','Equipped'));const gc=el('div','cd');
  [['Weapon','w'],['Head','helm'],['Body','chest'],['Legs','legs'],['Feet','boots'],['Arms','shield']].forEach(([l,s])=>{const eq=S.gear[s];const it=eq?ITEMS[eq]:null;const gs=el('div','');gs.innerHTML=`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #333"><div style="width:50px;font-size:10px;color:var(--st)">${l}</div><div style="flex:1;font-size:12px">${it?it.e+' '+it.n:'—'}</div><div style="font-size:10px;color:var(--st)">${it?(it.a?'+'+it.a:'+'+it.d):''}</div></div>`;
  if(eq){const rb=el('button','bt sm','Remove');rb.onclick=()=>{S.inv.push(eq);S.gear[s]=null;upAll()};gs.appendChild(rb)}gc.appendChild(gs)});tab.appendChild(gc);
  if(!S.inv?.length){tab.appendChild(el('div','cd','<span style="color:var(--st)">Pack empty.</span>'));return}
  const grp={};S.inv.forEach(id=>{if(!grp[id])grp[id]=0;grp[id]++});
  const secs={w:'⚔ Weapons',a:'🛡 Armor',c:'🩹 Supplies',m:'📦 Materials'};
  Object.entries(secs).forEach(([t,title])=>{
    const items=Object.entries(grp).filter(([id])=>ITEMS[id]?.t===t);if(!items.length)return;
    tab.appendChild(el('div','sh',title));
    items.forEach(([id,cnt])=>{const it=ITEMS[id];if(!it)return;const istat=it.a?'+'+it.a+' ATK':it.d?'+'+it.d+' DEF':it.hp?'+'+it.hp+' HP':'';
    const row=el('div','si');row.innerHTML=`<div style="font-size:24px">${it.e}</div><div style="flex:1"><div style="font-weight:bold;font-size:13px">${it.n}${cnt>1?' x'+cnt:''}</div><div style="font-size:10px;color:var(--st)">${istat}</div></div>`;
    const acts=el('div','');acts.style.cssText='display:flex;gap:3px';
    if(it.t==='c'){const ub=el('button','bt sm go','Use');ub.onclick=()=>{const idx=S.inv.indexOf(id);if(idx===-1)return;if(it.hp){S.hp=Math.min(S.maxHp,S.hp+it.hp)}S.inv.splice(idx,1);upAll()};acts.appendChild(ub)}
    if((it.t==='w'||it.t==='a')){const eb=el('button','bt sm go','Equip');eb.onclick=()=>{const idx=S.inv.indexOf(id);if(idx===-1)return;const sl=it.t==='w'?'w':(it.slot||'chest');if(S.gear[sl])S.inv.push(S.gear[sl]);S.inv.splice(idx,1);S.gear[sl]=id;upAll()};acts.appendChild(eb)}
    const db=el('button','bt sm dn','Drop');db.onclick=()=>{const idx=S.inv.indexOf(id);if(idx===-1)return;S.inv.splice(idx,1);upAll()};acts.appendChild(db);
    row.appendChild(acts);tab.appendChild(row)})});
}

function upQuests(){const tab=$('quests-tab');tab.innerHTML='';
  const active=S.quests.filter(q=>!q.done);const done=S.quests.filter(q=>q.done);
  tab.appendChild(el('div','sh','Active Tasks ('+active.length+')'));
  if(!active.length)tab.appendChild(el('div','cd','<span style="color:var(--st);font-style:italic">No tasks. Talk to people or visit safe houses.</span>'));
  else active.forEach(q=>{const qc=el('div','qc');let obj='';
    if(q.t==='kill'){const pct=Math.min(100,Math.round((q.kd||0)/q.kc*100));obj='<div class="hb" style="margin:4px 0"><div class="hf" style="width:'+pct+'%"></div></div><div style="font-size:10px">'+(q.kd||0)+'/'+q.kc+'</div>'}
    if(q.t==='travel'){const atDest=S.loc===q.dest;obj='<div style="font-size:11px;margin-top:4px">🗺 '+(LOCS[q.dest]?.n||q.dest)+(atDest?' ✅ HERE':'')+'</div>';if(atDest){const cb=el('button','bt sm go','✅ Complete');cb.onclick=()=>{q.done=1;S.gold+=q.rg;S.xp+=q.rx;log('Task done: '+q.name+'!','q');chkLU();upAll()};qc.appendChild(cb)}}
    qc.innerHTML='<div style="font-weight:bold">📋 '+q.name+'</div><div style="font-size:11px;color:var(--st)">'+q.desc+'</div>'+obj+'<div style="font-size:11px;color:var(--g)">📦'+q.rg+' · ⭐'+q.rx+'XP</div>';
    tab.appendChild(qc)});
  if(done.length){tab.appendChild(el('div','sh','Completed ('+done.length+')'));
    done.slice(-5).reverse().forEach(q=>tab.appendChild(el('div','qc done','<div style="font-weight:bold">✅ '+q.name+'</div>')))}}

function upSocial(){const tab=$('social-tab');tab.innerHTML='';
  tab.appendChild(el('div','sh','Group'));
  if(S.rets.length)S.rets.forEach(r=>{tab.appendChild(el('div','cd','<div style="font-size:12px">'+r.e+' '+r.name+' — '+r.role+' · Morale '+r.loy+'</div>'))});
  else tab.appendChild(el('div','cd','<span style="color:var(--st)">No group members.</span>'));
  tab.appendChild(el('div','sh','Relationships ('+S.relationships.length+')'));
  if(!S.relationships.length)tab.appendChild(el('div','cd','<span style="color:var(--st)">No relationships. Meet people.</span>'));
  S.relationships.forEach(r=>{const rc=el('div','cd');rc.style.cursor='pointer';
    rc.innerHTML=`<div style="display:flex;align-items:center;gap:10px"><div style="font-size:24px">${r.male?'👨':'👩'}</div><div style="flex:1"><div style="font-weight:bold">${r.name}</div><div style="font-size:10px;color:var(--st)">${r.rel} · Trust ${r.aff}${r.loc===S.loc?' · <span style="color:var(--hg)">Here</span>':''}</div></div></div>`;
    if(r.loc===S.loc)rc.onclick=()=>openNPCInteraction({name:r.name,male:r.male,age:r.age,role:r.rel},r);
    tab.appendChild(rc)})}

// ============================================================
// COMBAT
// ============================================================
function mkEnemy(tid){const d=ENT[tid];if(!d)return mkEnemy('walker');const sc=Math.max(0,S.level-d.l);return{id:tid+'_'+Date.now()+'_'+rnd(0,9999),tid,name:d.n,e:d.e,hp:d.hp+sc*3,maxHp:d.hp+sc*3,a:d.a+Math.floor(sc*.5),d:d.d+Math.floor(sc*.3),gold:rnd(d.g[0],d.g[1]),xp:d.x+sc*2}}

function startCombat(enemies){combat={enemies,round:0,log:[],summary:{killed:0,goldGained:0,xpGained:0}};$('CO').style.display='flex';renderCmbt()}
function renderCmbt(){if(!combat)return;
  const ea=$('EA');ea.innerHTML='';combat.enemies.forEach(e=>{const d=el('div','cu'+(e.hp<=0?' dead':''));d.id='cu_'+e.id;const p=hpPct(e.hp,e.maxHp);d.innerHTML='<span class="ue">'+e.e+'</span><div class="un">'+e.name+'</div><div class="uh">'+e.hp+'/'+e.maxHp+'</div><div class="hb"><div class="hf '+hpCls(p)+'" style="width:'+p+'%"></div></div>';ea.appendChild(d)});
  const aa=$('AA');aa.innerHTML='';const pd=el('div','cu');pd.id='cu_player';const pp=hpPct(S.hp,S.maxHp);pd.innerHTML='<span class="ue">'+(S.isMale?'👨':'👩')+'</span><div class="un">'+S.name+'</div><div class="uh">'+S.hp+'/'+S.maxHp+'</div><div class="hb"><div class="hf '+hpCls(pp)+'" style="width:'+pp+'%"></div></div>';aa.appendChild(pd);
  S.rets.forEach(r=>{if(r.hp<=0)return;const rd=el('div','cu');rd.id='cu_r_'+r.name.replace(/\s/g,'');const rp=hpPct(r.hp,r.maxHp);rd.innerHTML='<span class="ue">'+r.e+'</span><div class="un">'+r.name.split(' ')[0]+'</div><div class="uh">'+r.hp+'/'+r.maxHp+'</div><div class="hb"><div class="hf '+hpCls(rp)+'" style="width:'+rp+'%"></div></div>';aa.appendChild(rd)});
  const ad=$('CA');ad.innerHTML='';
  if(combat.enemies.some(e=>e.hp>0)){
    [{t:'⚔ Attack',c:'go',f:doAtk},{t:'🩹 Item',c:'',f:useCI},{t:'🏃 Flee',c:'dn',f:tryFlee}].forEach(a=>{const b=el('button','bt '+a.c,a.t);b.style.cssText='flex:1 1 80px;text-align:center;font-size:12px;padding:8px';b.onclick=a.f;ad.appendChild(b)})}
  $('CL').innerHTML=combat.log.slice(-12).reverse().map(l=>'<div>'+l+'</div>').join('')}
function cLog(m){if(!combat)return;combat.log.push(m)}
function shakeU(id){const e=$(id);if(!e)return;e.classList.remove('sh2');void e.offsetWidth;e.classList.add('sh2')}
function showDmg(id,d,hl){const e=$(id);if(!e)return;const f=el('div','df'+(hl?' hl':''),hl?'+'+d:'-'+d);e.style.position='relative';e.appendChild(f);setTimeout(()=>f.remove(),850)}

function doAtk(){
  if(!combat||!combat.enemies.some(e=>e.hp>0))return;
  combat.round++;const t=combat.enemies.find(e=>e.hp>0);if(!t)return;
  let dm=atk()+rnd(0,3)-Math.floor(t.d/2);dm=Math.max(1,dm);t.hp-=dm;
  cLog('You strike '+t.name+' for '+dm+'!');shakeU('cu_'+t.id);showDmg('cu_'+t.id,dm);
  if(t.hp<=0){t.hp=0;cLog(t.name+' destroyed!');onKill(t)}
  S.rets.forEach(r=>{if(r.hp>0&&combat&&combat.enemies.some(e=>e.hp>0)){const t2=combat.enemies.find(e=>e.hp>0);if(!t2)return;let dm2=r.a+rnd(0,2)-Math.floor(t2.d/2);dm2=Math.max(1,dm2);t2.hp-=dm2;cLog(r.name.split(' ')[0]+' hits '+t2.name+' for '+dm2+'.');if(t2.hp<=0){t2.hp=0;cLog(t2.name+' down!');onKill(t2)}}});
  if(!combat||!combat.enemies.some(e=>e.hp>0)){endCmbt(true);return}
  renderCmbt();setTimeout(()=>{if(combat){enemyTurn();renderCmbt()}},400);
}
function enemyTurn(){
  if(!combat)return;combat.enemies.filter(e=>e.hp>0).forEach(en=>{
    const tgts=[{tp:'p',ref:S,el:'cu_player'}];S.rets.filter(r=>r.hp>0).forEach(r=>tgts.push({tp:'r',ref:r,el:'cu_r_'+r.name.replace(/\s/g,'')}));
    let ch=rndA(tgts);let dm=en.a+rnd(0,2);
    if(ch.tp==='p'){dm=Math.max(1,dm-def());S.hp-=dm;cLog(en.name+' hits you for '+dm+'!');shakeU('cu_player');showDmg('cu_player',dm);if(S.hp<=0){S.hp=0;endCmbt(false);return}}
    else{const r=ch.ref;dm=Math.max(1,dm-Math.floor(r.def/2));r.hp-=dm;cLog(en.name+' hits '+r.name.split(' ')[0]+' for '+dm+'!');if(r.hp<=0){r.hp=0;cLog(r.name.split(' ')[0]+' is down!')}}});
}
function useCI(){const idx=S.inv.findIndex(id=>ITEMS[id]?.t==='c');if(idx===-1){cLog("No supplies!");return}const id=S.inv[idx];const it=ITEMS[id];if(it.hp){S.hp=Math.min(S.maxHp,S.hp+it.hp);showDmg('cu_player',it.hp,true);cLog('Used '+it.n+'. +'+it.hp+'HP.')}S.inv.splice(idx,1);renderCmbt();setTimeout(()=>{if(combat){enemyTurn();renderCmbt()}},400)}
function tryFlee(){if(R()<.3+(S.spd||3)*.04){cLog("Escaped!");endCmbt(false,true)}else{cLog("Can't escape!");setTimeout(()=>{if(combat){enemyTurn();renderCmbt()}},400)}}

function onKill(en){let g=en.gold;S.gold+=g;let x=en.xp;S.xp+=x;
  const isZombie=['walker','walker_fast','crawler','lurker','bloater','armored_walker','chained_walker'].includes(en.tid);
  if(isZombie){S.zombieKills=(S.zombieKills||0)+1;if(R()<.5)S.headshots=(S.headshots||0)+1}
  const lootTable=ENT[en.tid]?.loot||[];
  if(lootTable.length&&R()<.5){const item=rndA(lootTable);if(ITEMS[item])S.inv.push(item)}
  // Rare drops
  const rareItems=['r_machete','r_rifle','r_vest','r_helm'];
  const epicItems=['e_katana','e_crossbow','e_armor','lucille'];
  if(R()<.04){const ri=rndA(rareItems);S.inv.push(ri);cLog('✨ Rare: '+ITEMS[ri].n+'!')}
  if(R()<.01){const ei=rndA(epicItems);S.inv.push(ei);cLog('🔥 LEGENDARY: '+ITEMS[ei].n+'!')}
  S.kills[en.tid]=(S.kills[en.tid]||0)+1;S.fame=(S.fame||0)+1;
  S.quests.forEach(q=>{if(!q.done&&q.t==='kill'&&q.kt===en.tid){q.kd=(q.kd||0)+1;if(q.kd>=q.kc){q.done=1;S.gold+=q.rg;S.xp+=q.rx;log('Task done: '+q.name+'!','q');notify('Done: '+q.name+'!')}}});
  if(combat?.summary){combat.summary.killed++;combat.summary.goldGained+=g;combat.summary.xpGained+=x}
  chkLU()}

function endCmbt(won,fled){$('CO').style.display='none';const sum=combat?.summary;const huntMode=combat?._huntMode;const huntLoc=combat?._huntLoc;const travelDay=combat?._travelDay;combat=null;
  if(S.hp<=0){gameOver();return}
  if(travelDay!==undefined&&won){showResult('Clear!','⚔',['Path is clear.'],'Continue Travel',`$('TO').classList.add('A');processTravelDay(${travelDay})`);return}
  if(won&&sum&&sum.killed>0){showResult('Survived!','⚔',[sum.killed+' eliminated','📦 +'+sum.goldGained+' supplies','⭐ +'+sum.xpGained+'XP'],huntMode?'⚔ Scavenge Again':'Continue',huntMode?"quickHunt('"+huntLoc+"')":'upAll()')}
  else upAll()}

function quickHunt(locKey){const loc=LOCS[locKey];if(!loc){upAll();return}
  const huntEn=loc.sur?.length?loc.sur.flatMap(s=>s.en):['walker'];
  const cnt=rnd(1,3);const enemies=[];for(let i=0;i<cnt;i++)enemies.push(mkEnemy(rndA(huntEn)));
  startCombat(enemies);combat._huntMode=true;combat._huntLoc=locKey}

function gameOver(){
  openDlg(`<div style="text-align:center"><div style="font-size:48px;margin-bottom:8px">💀</div><h3 style="color:var(--bl);margin-bottom:8px;font-family:var(--font)">${S.name} Has Fallen</h3><p style="font-size:13px;margin-bottom:16px;font-style:italic;color:var(--st)">"In this world now... you kill or you die. Or you die and you kill."</p><p style="font-size:12px;color:var(--st)">Level ${S.level} · Day ${S.days} · ${S.zombieKills||0} walker kills</p><button class="bt go" style="text-align:center" onclick="closeDlg();newGame()">Try Again</button></div>`);
}

// ============================================================
// WORLD EVENTS
// ============================================================
function worldTick(){
  if(S.days-S.lastWorldTick<8)return;S.lastWorldTick=S.days;
  S.worldEvents=(S.worldEvents||[]).filter(ev=>{if(S.days-ev.started>ev.duration){log('📰 '+ev.title+' has ended.','e');return false}return true});
  if(R()<.6&&S.worldEvents.length<4){
    const template=rndA(WORLD_EVENTS);const factions=Object.keys(FLORDS);const f1=rndA(factions),f2=rndA(factions.filter(f=>f!==f1));
    const locKey=rndA(Object.keys(LOCS));const loc=LOCS[locKey];
    let title=template.title.replace('{f1}',f1).replace('{f2}',f2).replace('{loc}',loc.n).replace('{region}',loc.r);
    let desc=template.desc.replace('{f1}',f1).replace('{f2}',f2).replace('{loc}',loc.n).replace('{region}',loc.r);
    S.worldEvents.push({type:template.type,title,desc,started:S.days,duration:template.duration,loc:locKey});
    log('📻 <b>'+title+'</b>','e');
  }
}

function dailyEvent(){
  const r=R();
  if(r<.15){const g=rnd(1,5);S.gold+=g;log('Found '+g+' supplies while scavenging nearby.','e')}
  else if(r<.25){log(rndA(['Heard gunshots in the distance.','A herd passed nearby. Held your breath.','Radio static all day.','Rain washes away the blood.','Someone screams in the night.','Smoke on the horizon.','Found old graffiti: "GOD HELP US"','A dog follows you for a while.','Birds are back. A good sign?']),'e')}
}

// ============================================================
// NEW GAME
// ============================================================
function newGame(){
  S=clone(BASE);
  const bg=rndA(BACKGROUNDS);window._bgI=BACKGROUNDS.indexOf(bg);
  const autoMale=R()<.5;
  const autoName=(autoMale?rndA(FM):rndA(FF))+' '+rndA(LN);
  window._autoName=autoName;window._autoMale=autoMale;

  // Generate close people
  const closeCount=rnd(1,3);const closePeople=[];
  for(let i=0;i<closeCount;i++){
    const cm=R()<.5;const cn=(cm?rndA(FM):rndA(FF))+' '+rndA(LN);
    const cRoles=['sibling','best friend','partner','parent','old friend'];
    closePeople.push({name:cn,male:cm,role:rndA(cRoles),age:rnd(16,55)});
  }

  let closeHtml=closePeople.map(p=>`<div style="display:flex;align-items:center;gap:6px;padding:4px;background:#1e1e1e;border-radius:4px;margin:2px 0"><div style="font-size:18px">${p.male?'👨':'👩'}</div><div><div style="font-size:12px;font-weight:bold">${p.name}</div><div style="font-size:10px;color:var(--st)">${p.role} · Age ${p.age}</div></div></div>`).join('');

  openDlg(`<div style="text-align:center"><div style="font-size:48px;margin-bottom:6px">${autoMale?'👨':'👩'}</div><div style="font-size:18px;font-weight:bold;font-family:var(--font);margin-bottom:4px;color:var(--ink)">${autoName}</div><div style="font-size:13px;color:var(--g);margin-bottom:4px">${bg.n}</div><div style="font-size:11px;color:var(--st);font-style:italic;margin-bottom:10px">${bg.d}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:11px;margin-bottom:10px">
  <div style="background:#1e1e1e;padding:6px;border-radius:4px;text-align:center">⚔ ${bg.atk_base}</div>
  <div style="background:#1e1e1e;padding:6px;border-radius:4px;text-align:center">🛡 ${bg.def_base}</div>
  <div style="background:#1e1e1e;padding:6px;border-radius:4px;text-align:center">💨 ${bg.spd}</div></div>
  <div style="font-size:11px;color:var(--g);margin-bottom:4px;font-family:var(--font)">YOUR PEOPLE:</div>${closeHtml}
  <button class="bt go" style="text-align:center;margin-top:10px" onclick="quickStart('${autoName.replace(/'/g,"\\'")}',${autoMale})">Survive as ${autoName.split(' ')[0]}</button>
  <button class="bt" style="text-align:center" onclick="closeDlg();newGame()">🔄 Reroll</button></div>`);

  window._closePeople=closePeople;
}

function quickStart(name,male){
  const bg=BACKGROUNDS[window._bgI];
  S.name=name;S.isMale=male;S.atk_base=bg.atk_base;S.def_base=bg.def_base;S.spd=bg.spd;
  S.gold=bg.gold;S.bg=bg.id;S.class=bg.class;S.prestige=bg.prestige;
  S.loc=resolveStartLoc(bg);S.inv=clone(bg.items);S.maxHp=maxHp();S.hp=S.maxHp;S.age=rnd(20,40);
  S.honor=rnd(3,7);S.ambition=rnd(3,8);S.diplomacy=bg.spd||3;
  // Add close people as relationships and possibly as group members
  const cp=window._closePeople||[];
  cp.forEach((p,pi)=>{
    S.relationships.push({name:p.name,rel:p.role,aff:rnd(50,85),male:p.male,age:p.age,loc:S.loc,met:0});
    // First close person joins group
    if(pi===0&&S.rets.length<4){
      const rt=rndA(Object.keys(RET_T));const rtd=RET_T[rt];const trait=rndA(TRAITS);
      S.rets.push({name:p.name,role:rtd.n,e:rtd.e,a:rtd.a,def:rtd.d||2,hp:rtd.hp,maxHp:rtd.hp,w:rtd.w||4,loy:70,trait:trait.t,td:trait.d,back:'Your '+p.role+'. Been together since the start.',gear:null,armour:null});
    }
  });
  closeDlg();
  log(S.name+' — '+bg.n+'. Day 1.','q');
  log('The dead walk. Survive.','e');
  if(cp.length)log('You\'re not alone. '+cp.map(p=>p.name).join(', ')+' '+(['are','is'])[cp.length===1?1:0]+' with you.','q');
  upAll();save();sw('realm');
}

function confirmNewGame(){openDlg(`<div style="text-align:center"><div style="font-size:36px;margin-bottom:8px">☠</div><h3 style="margin-bottom:8px;color:var(--ink)">Start Over?</h3><p style="font-size:12px;color:var(--st);margin-bottom:16px">Current progress will be lost.</p><button class="bt dn" style="text-align:center" onclick="doNewGame()">Yes, restart</button><button class="bt" style="text-align:center;margin-top:4px" onclick="closeDlg()">No, go back</button></div>`)}
function doNewGame(){localStorage.removeItem('wd_rpg');S=null;closeDlg();setTimeout(newGame,150)}

// ============================================================
// INIT
// ============================================================
function init(){
  if(!load()){newGame()}
  else{upAll();sw('realm')}
}
window.onload=init;
window.onerror=function(msg,url,line){console.error('Error:',msg,'line',line);return true};
document.addEventListener('visibilitychange',()=>{if(document.hidden&&S)save()});
</script>
